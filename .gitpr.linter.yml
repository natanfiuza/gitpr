# ==============================================================================
# 🛡️ GitPR - Configuração do Linter Estático Local
# ==============================================================================
# Este arquivo define as regras de qualidade que rodam na máquina do desenvolvedor.
# O GitPR analisa apenas as LINHAS MODIFICADAS no 'git diff'.
# 
# Propriedades da Regra:
# - name: Identificador único da regra (sem espaços).
# - level: 'error' (trava o commit) ou 'warning' (apenas exibe alerta amarelo).
# - extensions: Lista de extensões de arquivo onde a regra atua (ex: ["php", "js"]).
# - require_paths: (Opcional) Limita a execução a pastas específicas (ex: ["routes/*"]).
# - ignore_paths: (Opcional) Ignora pastas específicas (ex: ["vendor/*", "tests/*"]).
# - regex: A expressão regular de busca (USE SEMPRE aspas simples '').
# - message: O texto do alerta. Aceita as variáveis {file_name} e {line_number}.
# - ignore_comments: true (ignora código comentado) / false (lê os comentários).
# ==============================================================================

rules:
  # ---------------------------------------------------------
  # 🚨 ERROS CRÍTICOS (Bloqueiam o Commit)
  # ---------------------------------------------------------

  #- name: ""
  #  level: ""
  #  extensions: [""]
  #  regex: ''
  #  message: ""
  #  ignore_comments: true

  # ---------------------------------------------------------
  # ⚠️ AVISOS DE BOAS PRÁTICAS (Não bloqueiam o Commit)
  # ---------------------------------------------------------



  - name: "warning-todo-fixme"
    level: "warning"
    extensions: ["php", "js", "ts", "vue", "py"]
    regex: '(?i)(TODO|FIXME):'
    message: "⚠️ Atenção: Existe uma anotação TODO ou FIXME pendente em {file_name} (Linha {line_number})."
    ignore_comments: false # Aqui precisamos de ler os comentários propositadamente!

  - name: "check-ia-indice"
    extensions: ["py"]
    level: "warning"
    regex: '^\s*#\s*\d+\.'
    message: "🚨 Comentário de índice encontrado no arquivo {file_name} (Linha {line_number}) - Verifique se é intencional ou foi IA"  
    ignore_comments: false